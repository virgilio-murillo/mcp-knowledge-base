name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: cd server && pip install -e ".[test]"
      - run: cd server && ruff check src/ tests/
      - run: cd server && mypy src/mcp_kb/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: cd server && pip install -e ".[test]"
      - run: cd server && pytest tests/ -m "not integration" -v

  integration:
    needs: test
    strategy:
      matrix:
        include:
          - name: Ubuntu
            runs-on: ubuntu-latest
            container: null
          - name: Arch Linux
            runs-on: ubuntu-latest
            container: archlinux:latest
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    name: integration (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install Python (Arch)
        if: matrix.container == 'archlinux:latest'
        run: pacman -Sy --noconfirm python python-pip

      - uses: actions/setup-python@v5
        if: matrix.container == null
        with:
          python-version: "3.13"

      - run: cd server && pip install --break-system-packages -e ".[test]" || cd server && pip install -e ".[test]"
      - run: cd server && pytest tests/ -m integration -v
